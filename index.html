<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="todo-card">
      <h1 class="title">Todo List</h1>
      <div class="input-section">
        <input type="text" class="taskText" placeholder="Write a new task...">
        <button class="add">Add</button>
      </div>
      <div class="actions">
        <button class="all currentBtn" data-id="allBtn">All</button>
        <button class="active" data-id="activeBtn">Active</button>
        <button class="completed" data-id="completedBtn">Completed</button>
      </div>
      <div class="list"></div>
    </div>
  </div>
  <script src="index.js"></script>
</body>

</html>
